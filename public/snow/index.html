<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>湖心亭看雪</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #101820; }
  body {
    font-family: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", "NSimSun", serif;
    -webkit-font-smoothing: antialiased;
  }
  #scene { display: block; width: 100%; height: 100%; cursor: grab; touch-action: none; }
  #scene.dragging { cursor: grabbing; }

  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    background: radial-gradient(115% 100% at 50% 42%, transparent 58%, rgba(8,14,20,.38) 100%);
  }

  /* 左上角 题名与印章 */
  #brand {
    position: fixed; left: 26px; top: 26px; z-index: 10;
    writing-mode: vertical-rl; letter-spacing: .34em;
    color: rgba(233,239,243,.88); font-size: 15px;
    text-shadow: 0 1px 10px rgba(10,18,26,.55);
    user-select: none; pointer-events: none;
  }
  #brand span { font-size: 11px; color: rgba(200,212,221,.7); margin-top: 12px; letter-spacing: .3em; }
  #brand i {
    font-style: normal; margin-top: 12px; padding: 5px 4px;
    background: #9e3b2b; color: #f4e9df; font-size: 13px; letter-spacing: 0;
    text-shadow: none; border-radius: 2px;
  }

  /* 右侧 逐句浮现的原文 */
  #stage {
    position: fixed; right: 38px; top: 11vh; z-index: 10;
    writing-mode: vertical-rl; max-height: 62vh;
    font-size: clamp(14px, 2vh, 20px); letter-spacing: .3em; line-height: 2.3;
    color: rgba(238,243,246,.93); text-shadow: 0 1px 14px rgba(10,18,26,.65);
    transition: opacity .5s ease; user-select: none; pointer-events: none;
  }

  /* 底部 操作提示 */
  #hint {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 20px; z-index: 10;
    font-size: 12px; letter-spacing: .22em; white-space: nowrap;
    color: rgba(210,220,228,.8); background: rgba(16,24,32,.38);
    padding: 7px 18px; border-radius: 999px; backdrop-filter: blur(4px);
    user-select: none; pointer-events: none;
  }

  /* 右下 按钮组 */
  #ctrls { position: fixed; right: 22px; bottom: 20px; z-index: 11; display: flex; flex-direction: column; gap: 10px; }
  button {
    font-family: inherit; font-size: 13px; letter-spacing: .28em; text-indent: .28em;
    color: #e8eef2; background: rgba(233,240,245,.10);
    border: 1px solid rgba(233,240,245,.35); border-radius: 3px;
    padding: 10px 16px; cursor: pointer; backdrop-filter: blur(4px);
    transition: background .25s, border-color .25s, box-shadow .25s;
  }
  button:hover { background: rgba(233,240,245,.24); }
  a.sitelink {
    display: block; text-align: center; text-decoration: none;
    font-size: 13px; letter-spacing: .28em; text-indent: .28em;
    color: #e8eef2; background: rgba(233,240,245,.10);
    border: 1px solid rgba(233,240,245,.35); border-radius: 3px;
    padding: 10px 16px; backdrop-filter: blur(4px);
    transition: background .25s, border-color .25s;
  }
  a.sitelink:hover { background: rgba(233,240,245,.24); }
  #btnRow.held { background: rgba(255,176,96,.30); border-color: rgba(255,196,130,.65); }
  #btnPavilion { display: none; }
  #btnPavilion.glow { box-shadow: 0 0 16px rgba(255,178,100,.5); border-color: rgba(255,196,130,.75); }

  /* 开场与结尾 覆层 */
  .overlay {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6vh;
    transition: opacity 1.1s ease;
  }
  #intro { background: radial-gradient(120% 90% at 50% 110%, #42576b 0%, #26343f 45%, #101820 100%); }
  #endCard { background: rgba(13,20,27,.92); z-index: 25; }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .vwrap { direction: rtl; display: flex; align-items: center; gap: clamp(22px, 4vw, 56px); height: 56vh; }
  .vwrap h1, .vwrap h2 {
    writing-mode: vertical-rl; white-space: nowrap; font-weight: 600; color: #ecf1f4;
    font-size: clamp(38px, 7.5vh, 66px); letter-spacing: .22em;
  }
  .vwrap h2 { font-size: clamp(30px, 6vh, 54px); }
  .vwrap .quote {
    writing-mode: vertical-rl; max-height: 46vh;
    font-size: clamp(13px, 1.9vh, 17px); letter-spacing: .34em; line-height: 2.2;
    color: #a9bac7;
  }
  .vwrap .quote.dim { color: #7b8b99; }
  .vwrap .sub { writing-mode: vertical-rl; font-size: 13px; letter-spacing: .42em; color: #7b8b99; }

  .overlay .tip { font-size: 12px; letter-spacing: .26em; color: rgba(180,195,208,.6); }
  .overlay button { font-size: 15px; padding: 13px 30px; }
  .overlay .row { display: flex; gap: 16px; }
  #loadError { display: none; font-size: 13px; letter-spacing: .2em; color: #d98c7a; }

  @media (max-width: 640px) {
    #brand { left: 12px; top: 12px; font-size: 13px; }
    #stage { right: 14px; top: 8vh; max-height: 50vh; font-size: 13px; }
    #hint { display: none; }
    #ctrls { right: 12px; bottom: 14px; }
    button { padding: 9px 12px; font-size: 12px; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="vignette"></div>

<div id="brand">湖心亭看雪<span>张岱</span><i>痴</i></div>
<div id="stage"></div>
<div id="hint">拖动 环顾 · 点击水面 行舟 · 滚轮 远近</div>

<div id="ctrls">
  <a class="sitelink" href="/projects/snow/" title="返回网站">回网站</a>
  <button id="btnRow">划桨</button>
  <button id="btnAerial">俯瞰全湖</button>
  <button id="btnPavilion">登亭小坐</button>
</div>

<div id="intro" class="overlay">
  <div class="vwrap">
    <h1>湖心亭看雪</h1>
    <div class="quote">崇祯五年十二月，余住西湖。大雪三日，湖中人鸟声俱绝。</div>
    <div class="sub">张岱 · 陶庵梦忆</div>
  </div>
  <button id="btnStart">独往湖心亭</button>
  <div class="tip">拖动环顾 · 点击水面行舟 · 空格或长按「划桨」 · 滚轮远近</div>
  <div id="loadError">three.js 未能加载，请确认 three.min.js 与本页面在同一目录。</div>
</div>

<div id="endCard" class="overlay hidden">
  <div class="vwrap">
    <h2>湖心亭看雪</h2>
    <div class="quote">雾凇沆砀，天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。</div>
    <div class="quote dim">莫说相公痴，更有痴似相公者。</div>
  </div>
  <div class="row">
    <button id="btnAgain">再游一次</button>
    <button id="btnStay">继续泛舟</button>
  </div>
</div>

<script src="./three.min.js"></script>
<script>window.THREE || document.write('<script src="https:\/\/cdn.jsdelivr.net\/npm\/three@0.128.0\/build\/three.min.js"><\/script>')</script>
<script src="./app.js"></script>
</body>
</html>
